name: terraform

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: 1.7.5
  AWS_REGION: us-east-1

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -recursive -check -diff

  validate:
    name: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir:
          - terraform/envs/demo
          - terraform/bootstrap/oidc
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init -backend=false -input=false
        working-directory: ${{ matrix.dir }}
      - run: terraform validate
        working-directory: ${{ matrix.dir }}

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --init
      - run: tflint --recursive

  # `terraform plan` is intentionally not wired into routine CI yet. Without a
  # remote backend (S3 + DynamoDB) the runner has no state to compare against,
  # so plan would always show "create everything from scratch" and burn time
  # without value. Phase 2 adds a remote backend; until then, run plans
  # locally against the operator's terraform.tfvars.
